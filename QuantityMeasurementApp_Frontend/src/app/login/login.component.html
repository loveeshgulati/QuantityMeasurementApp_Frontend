<div class="auth-wrapper">
  <div class="card">

    <a routerLink="/" class="back-link">← Back</a>

    <div class="logo">🔐</div>
    <h1>Welcome back!</h1>
    <p class="subtitle">Log in to access your measurement history.</p>

    <div *ngIf="errorMsg" class="alert alert-error">{{ errorMsg }}</div>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Your password" />
    </div>

    <button class="btn-primary" (click)="onLogin()" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Log In' }}
    </button>

    <p class="switch-link">
      Don't have an account? <a routerLink="/signup">Sign up</a>
    </p>

  </div>
</div>
