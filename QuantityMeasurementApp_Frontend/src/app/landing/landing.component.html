<div class="landing-wrapper">
  <div class="card">

    <div class="logo">📐</div>
    <h1>Quantity Measurement</h1>
    <p class="subtitle">
      Compare, convert, add, subtract and divide quantities — all in one place.
    </p>

    <div class="actions">
      <button class="btn-primary" (click)="goLogin()">🔐 Log In</button>
      <button class="btn-secondary" (click)="goSignup()">✨ Create Account</button>
      <div class="divider"><span>or</span></div>
      <button class="btn-ghost" (click)="continueAsGuest()">👤 Continue as Guest</button>
    </div>

    <p class="guest-note">
      Guest mode gives you full access without saving history.
    </p>

  </div>
</div>
