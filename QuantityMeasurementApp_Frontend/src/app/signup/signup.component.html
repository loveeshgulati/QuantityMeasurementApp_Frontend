<div class="auth-wrapper">
  <div class="card">

    <a routerLink="/" class="back-link">← Back</a>

    <div class="logo">✨</div>
    <h1>Create your account</h1>
    <p class="subtitle">Start measuring quantities in seconds.</p>

    <div *ngIf="errorMsg" class="alert alert-error">{{ errorMsg }}</div>
    <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="name" placeholder="e.g. John Doe" />
    </div>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="At least 6 characters" />
    </div>

    <button class="btn-primary" (click)="onSignup()" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Sign Up' }}
    </button>

    <p class="switch-link">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>

  </div>
</div>
