services:
  - type: web
    name: quantity-measurement-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist/quantity-measurement-app/browser
    routes:
      - type: rewrite
        source: /(.*) 
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 18
